<title>Training Plan</title>
<style>
  html, body { margin: 0; padding: 0; background: #0E1416; }
</style>
</head>
<body>
<div id="app"></div>
<style>
  :root {
    --bg: #0E1416;
    --card: #161D20;
    --card-border: #232C30;
    --teal: #2DD4BF;
    --coral: #FF7A5C;
    --text: #EDF2F1;
    --text-dim: #8A9A98;
    --text-faint: #5A6B69;
  }
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  #app {
    font-family: -apple-system, "SF Pro Text", "Segoe UI", Roboto, sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    padding: env(safe-area-inset-top) 0 calc(40px + env(safe-area-inset-bottom)) 0;
  }
  .header {
    padding: 20px 18px 14px;
    border-bottom: 1px solid var(--card-border);
  }
  .header h1 {
    font-size: 19px;
    font-weight: 700;
    margin: 0 0 2px;
    letter-spacing: -0.01em;
  }
  .header p {
    font-size: 13px;
    color: var(--text-dim);
    margin: 0;
  }
  .streak-row {
    display: flex;
    gap: 6px;
    margin-top: 14px;
  }
  .streak-dot {
    flex: 1;
    height: 5px;
    border-radius: 3px;
    background: var(--card-border);
  }
  .streak-dot.done { background: var(--teal); }
  .view-toggle {
    display: flex;
    gap: 6px;
    padding: 14px 18px 0;
  }
  .backup-row {
    display: flex;
    gap: 8px;
    padding: 10px 18px 0;
  }
  .backup-link {
    font-size: 12px;
    color: var(--text-faint);
    text-decoration: underline;
    cursor: pointer;
  }
  .backup-panel {
    margin: 10px 18px 0;
    background: var(--card);
    border: 1px solid var(--card-border);
    border-radius: 12px;
    padding: 14px;
  }
  .backup-panel .bp-title {
    font-size: 13px;
    font-weight: 700;
    margin-bottom: 4px;
  }
  .backup-panel .bp-desc {
    font-size: 12px;
    color: var(--text-dim);
    line-height: 1.5;
    margin-bottom: 12px;
  }
  .backup-btn-row {
    display: flex;
    gap: 8px;
  }
  .backup-btn {
    flex: 1;
    padding: 10px;
    border-radius: 9px;
    border: 1px solid var(--card-border);
    background: var(--bg);
    color: var(--text);
    font-size: 13px;
    font-weight: 700;
    cursor: pointer;
    text-align: center;
  }
  .backup-btn.primary { background: var(--teal); color: #0E1416; border-color: var(--teal); }
  .backup-status {
    font-size: 12px;
    margin-top: 10px;
    color: var(--text-dim);
    text-align: center;
  }
  .view-btn {
    flex: 1;
    padding: 11px 4px;
    min-height: 44px;
    border-radius: 10px;
    border: 1px solid var(--card-border);
    background: var(--card);
    color: var(--text-dim);
    font-size: 12px;
    font-weight: 700;
    cursor: pointer;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 2px;
  }
  .view-btn .vb-icon { font-size: 15px; line-height: 1; }
  .view-btn.active {
    background: var(--coral);
    color: #0E1416;
    border-color: var(--coral);
  }
  .tabs {
    display: flex;
    overflow-x: auto;
    gap: 8px;
    padding: 14px 18px;
    border-bottom: 1px solid var(--card-border);
    scrollbar-width: none;
  }
  .tabs::-webkit-scrollbar { display: none; }
  .tab {
    flex: 0 0 auto;
    position: relative;
    padding: 10px 14px;
    min-height: 44px;
    border-radius: 20px;
    background: var(--card);
    border: 1px solid var(--card-border);
    font-size: 13px;
    font-weight: 600;
    color: var(--text-dim);
    white-space: nowrap;
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .tab.active {
    background: var(--teal);
    color: #0E1416;
    border-color: var(--teal);
  }
  .tab.legs.active { background: var(--teal); border-color: var(--teal); color: #0E1416; }
  .tab.push.active { background: var(--coral); border-color: var(--coral); color: #0E1416; }
  .tab.pull.active { background: #B39DFF; border-color: #B39DFF; color: #0E1416; }
  .tab.swim.active { background: #4FC3F7; border-color: #4FC3F7; color: #0E1416; }
  .tab.today::after {
    content: '';
    position: absolute;
    top: -3px;
    right: -3px;
    width: 7px;
    height: 7px;
    border-radius: 50%;
    background: var(--coral);
  }
  .tab .sub { font-weight: 400; opacity: 0.75; margin-left: 4px; }
  .tab .badge {
    margin-left: 6px;
    font-size: 10px;
    font-weight: 700;
    opacity: 0.85;
  }
  .tab-icon { font-size: 14px; line-height: 1; }
  .ring {
    width: 22px;
    height: 22px;
    flex-shrink: 0;
  }
  .content { padding: 16px 18px; }
  .day-title {
    font-size: 22px;
    font-weight: 800;
    margin: 0 0 2px;
  }
  .day-meta {
    font-size: 13px;
    color: var(--text-dim);
    margin: 0 0 4px;
  }
  .swipe-hint {
    font-size: 11px;
    color: var(--text-faint);
    margin-bottom: 14px;
  }
  .ex-card {
    background: var(--card);
    border: 1px solid var(--card-border);
    border-radius: 14px;
    margin-bottom: 12px;
    overflow: hidden;
  }
  .ex-card.complete { border-color: var(--teal); }
  .ex-head {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 14px 14px 10px;
    cursor: pointer;
  }
  .ex-name { font-size: 15px; font-weight: 700; }
  .ex-target { font-size: 12px; color: var(--text-dim); margin-top: 2px; }
  .chev { color: var(--text-faint); font-size: 12px; transition: transform 0.2s; }
  .chev.open { transform: rotate(180deg); }
  .ex-how {
    padding: 0 14px 12px;
    font-size: 13px;
    line-height: 1.5;
    color: var(--text-dim);
    border-bottom: 1px solid var(--card-border);
    display: none;
  }
  .ex-how.open { display: block; }
  .sets-row {
    display: flex;
    gap: 8px;
    padding: 12px 14px;
  }
  .set-box {
    flex: 1;
    text-align: center;
  }
  .set-label { font-size: 10px; color: var(--text-faint); margin-bottom: 4px; font-weight: 600; }
  .set-check {
    width: 100%;
    min-height: 46px;
    aspect-ratio: 1;
    border-radius: 10px;
    border: 1.5px solid var(--card-border);
    background: transparent;
    display: flex;
    align-items: center;
    justify-content: center;
    color: var(--text-faint);
    font-size: 18px;
    cursor: pointer;
  }
  .set-check.checked {
    background: var(--teal);
    border-color: var(--teal);
    color: #0E1416;
  }
  .weight-row {
    display: flex;
    gap: 8px;
    padding: 0 14px 14px;
    align-items: center;
  }
  .weight-row label { font-size: 12px; color: var(--text-dim); flex: 0 0 auto; }
  .weight-row input {
    background: var(--bg);
    border: 1px solid var(--card-border);
    border-radius: 8px;
    color: var(--text);
    padding: 6px 10px;
    font-size: 13px;
    width: 70px;
  }
  .weight-row .last-hint {
    font-size: 11px;
    color: var(--text-faint);
  }
  .swim-card {
    background: var(--card);
    border: 1px solid var(--card-border);
    border-radius: 14px;
    padding: 18px;
    text-align: center;
  }
  .swim-card .icon { font-size: 32px; margin-bottom: 8px; }
  .swim-card .desc { font-size: 13px; color: var(--text-dim); line-height: 1.5; margin: 8px 0 16px; }
  .swim-input { display: flex; gap: 8px; justify-content: center; align-items: center; margin-bottom: 12px; }
  .swim-input input {
    background: var(--bg);
    border: 1px solid var(--card-border);
    border-radius: 8px;
    color: var(--text);
    padding: 8px 12px;
    font-size: 14px;
    width: 70px;
    text-align: center;
  }
  .swim-input label { font-size: 13px; color: var(--text-dim); }
  .done-btn {
    width: 100%;
    padding: 13px;
    border-radius: 10px;
    border: none;
    font-size: 14px;
    font-weight: 700;
    cursor: pointer;
    margin-top: 6px;
  }
  .done-btn.pending { background: var(--teal); color: #0E1416; }
  .done-btn.done { background: var(--card-border); color: var(--text-dim); }
  .timing-note {
    font-size: 12px;
    color: var(--text-faint);

<script>
  // Storage shim: mimics Claude's window.storage API using localStorage,
  // so this works as a fully standalone page outside Claude's environment.
  window.storage = {
    get: async (key) => {
      const v = localStorage.getItem(key);
      return v !== null ? { key, value: v } : null;
    },
    set: async (key, value) => {
      localStorage.setItem(key, value);
      return { key, value };
    },
    delete: async (key) => {
      localStorage.removeItem(key);
      return { key, deleted: true };
    },
    list: async (prefix) => {
      const keys = Object.keys(localStorage).filter(k => !prefix || k.startsWith(prefix));
      return { keys };
    }
  };

function todayKey() {
  const d = new Date();
  return d.toISOString().slice(0,10);
}

function daysBetween(dateStrA, dateStrB) {
  const a = new Date(dateStrA + 'T00:00:00');
  const b = new Date(dateStrB + 'T00:00:00');
  return Math.round((b - a) / (1000 * 60 * 60 * 24));
}

function LineChart({ points, color }) {
  // points: array of { x: label, y: number }, oldest first
  if (!points || points.length < 2) {
    return <div className="hist-empty">Log at least 2 data points to see a trend line.</div>;
  }
  const w = 320, h = 120, pad = 10;
  const ys = points.map(p => p.y);
  const minY = Math.min(...ys), maxY = Math.max(...ys);
  const range = maxY - minY || 1;
  const stepX = (w - pad * 2) / (points.length - 1);
  const coords = points.map((p, i) => {
    const x = pad + i * stepX;
    const y = h - pad - ((p.y - minY) / range) * (h - pad * 2);
    return [x, y];
  });
  const pathD = coords.map((c, i) => (i === 0 ? `M ${c[0]} ${c[1]}` : `L ${c[0]} ${c[1]}`)).join(' ');
  const areaD = pathD + ` L ${coords[coords.length-1][0]} ${h-pad} L ${coords[0][0]} ${h-pad} Z`;
  return (
    <svg viewBox={`0 0 ${w} ${h}`} style={{width: '100%', height: 'auto', display: 'block'}}>
      <path d={areaD} fill={color} opacity="0.12" />
      <path d={pathD} fill="none" stroke={color} strokeWidth="2.5" strokeLinejoin="round" strokeLinecap="round" />
      {coords.map((c, i) => (
        <circle key={i} cx={c[0]} cy={c[1]} r={i === coords.length - 1 ? 4 : 2.5} fill={color} />
      ))}
    </svg>
  );
}

function ProgressRing({ pct, color, size = 22 }) {
  const r = size / 2 - 2.5;
  const c = 2 * Math.PI * r;
  const offset = c - (pct / 100) * c;
  return (
    <svg className="ring" viewBox={`0 0 ${size} ${size}`}>
      <circle cx={size/2} cy={size/2} r={r} fill="none" stroke="rgba(255,255,255,0.12)" strokeWidth="2.5" />
      <circle
        cx={size/2} cy={size/2} r={r} fill="none" stroke={color} strokeWidth="2.5"
        strokeDasharray={c} strokeDashoffset={offset} strokeLinecap="round"
        transform={`rotate(-90 ${size/2} ${size/2})`}
      />
    </svg>
  );
}

  useEffect(() => {
    function handleVisibility() {
      if (document.visibilityState === 'visible' && rest && !wakeLockRef.current) {
        acquireWakeLock();
      }
    }
    document.addEventListener('visibilitychange', handleVisibility);
    return () => document.removeEventListener('visibilitychange', handleVisibility);
  }, [rest]);

  // Load log + cycle start date on mount
  useEffect(() => {
    (async () => {
      let loadedLog = {};
      try {
        const res = await window.storage.get('workout-log', false);
        if (res && res.value) loadedLog = JSON.parse(res.value);
      } catch (e) { /* no log yet */ }
      setLog(loadedLog);

      let loadedBodyLog = {};
      try {
        const bres = await window.storage.get('body-log', false);
        if (bres && bres.value) loadedBodyLog = JSON.parse(bres.value);
      } catch (e) { /* no body log yet */ }
      setBodyLog(loadedBodyLog);

      try {
        const gres = await window.storage.get('goal-weight', false);
        if (gres && gres.value) setGoalWeightState(gres.value);
      } catch (e) { /* no goal set yet */ }

      try {
        const cdres = await window.storage.get('custom-days', false);
        if (cdres && cdres.value) setCustomDays(JSON.parse(cdres.value));
      } catch (e) { /* no custom days yet */ }

      let start = todayKey();
      try {
        const cs = await window.storage.get('cycle-start', false);
        if (cs && cs.value) start = cs.value;
        else await window.storage.set('cycle-start', start, false);
      } catch (e) {
        try { await window.storage.set('cycle-start', start, false); } catch (e2) {}
      }
      setCycleStart(start);

      const diff = daysBetween(start, todayKey());
      const computedDay = ((diff % 7) + 7) % 7 + 1;
      setActiveDay(computedDay);
      setLoaded(true);
    })();
  }, []);

  async function persist(newLog) {
    setLog(newLog);
    try {
      await window.storage.set('workout-log', JSON.stringify(newLog), false);
    } catch (e) { console.error('save failed', e); }
    setToast(true);
    clearTimeout(toastTimer.current);
    toastTimer.current = setTimeout(() => setToast(false), 1200);
  }

  function dayKey(dayId) {
    return `${todayKey()}_day${dayId}`;
  }

  function currentDayIdForToday() {
    if (!cycleStart) return 1;
    const diff = daysBetween(cycleStart, todayKey());
    return ((diff % 7) + 7) % 7 + 1;
  }

  function startRest(seconds, exName) {
    clearInterval(restInterval.current);
    setRest({ secondsLeft: seconds, total: seconds, exName });
    acquireWakeLock();
    restInterval.current = setInterval(() => {
      setRest(prev => {
        if (!prev) return prev;
        if (prev.secondsLeft <= 1) {
          clearInterval(restInterval.current);
          releaseWakeLock();
          if (navigator.vibrate) { try { navigator.vibrate([120, 60, 120]); } catch(e) {} }
          return null;
        }
        return { ...prev, secondsLeft: prev.secondsLeft - 1 };
      });
    }, 1000);
  }

  function skipRest() {
    clearInterval(restInterval.current);
    releaseWakeLock();
    setRest(null);
  }

  function toggleSet(dayId, exIdx, setIdx, exDef) {
    const key = dayKey(dayId);
    const dayLog = { ...(log[key] || {}) };
    const exLog = { ...(dayLog[exIdx] || { checks: [], weight: '' }) };
    const checks = [...(exLog.checks || [])];
    const wasChecked = !!checks[setIdx];
    checks[setIdx] = !wasChecked;
    exLog.checks = checks;
    dayLog[exIdx] = exLog;
    persist({ ...log, [key]: dayLog });
    if (!wasChecked) {
      startRest(exDef.rest || 75, exDef.name);
    }
  }

  function setWeight(dayId, exIdx, val) {
    const key = dayKey(dayId);
    const dayLog = { ...(log[key] || {}) };
    const exLog = { ...(dayLog[exIdx] || { checks: [], weight: '' }) };
    exLog.weight = val;
    dayLog[exIdx] = exLog;
    persist({ ...log, [key]: dayLog });
  }

  function toggleSwimDone(dayId) {
    const key = dayKey(dayId);
    const dayLog = { ...(log[key] || {}) };
    dayLog.swimDone = !dayLog.swimDone;
    persist({ ...log, [key]: dayLog });
  }

  function setSwimMinutes(dayId, val) {
    const key = dayKey(dayId);
    const dayLog = { ...(log[key] || {}) };
    dayLog.swimMinutes = val;
    persist({ ...log, [key]: dayLog });
  }

  // find most recent past weight for a given day+exercise (before today)
  function lastWeightFor(dayId, exIdx) {
    const keys = Object.keys(log)
      .filter(k => k.endsWith(`_day${dayId}`) && k !== dayKey(dayId))
      .sort((a, b) => b.localeCompare(a));
    for (const k of keys) {
      const exLog = log[k] && log[k][exIdx];
      if (exLog && exLog.weight) return exLog.weight;
    }
    return null;
  }

  // Auto-fill last weight into today's entries when switching to a lift day
  useEffect(() => {
    if (!loaded) return;
    const dayDef = DAYS.find(d => d.id === activeDay);
    if (!dayDef || dayDef.type !== 'lift') return;
    const key = dayKey(activeDay);
    const existing = log[key];
    let changed = false;
    const newDayLog = { ...(existing || {}) };
    dayDef.exercises.forEach((ex, exIdx) => {
      const exLog = newDayLog[exIdx];
      if (!exLog || !exLog.weight) {
        const last = lastWeightFor(activeDay, exIdx);
        if (last) {
          newDayLog[exIdx] = { ...(exLog || { checks: [] }), weight: last };
          changed = true;
        }
      }
    });
    if (changed) {
      setLog(prev => ({ ...prev, [key]: newDayLog }));
      window.storage.set('workout-log', JSON.stringify({ ...log, [key]: newDayLog }), false).catch(()=>{});
    }
    // eslint-disable-next-line
  }, [activeDay, loaded, customDays]);

  // streak: which of last 7 calendar days have any logged activity
  function getStreak() {
    const arr = [];
    for (let i = 6; i >= 0; i--) {
      const d = new Date();
      d.setDate(d.getDate() - i);
      const dstr = d.toISOString().slice(0,10);
      const hasActivity = Object.keys(log).some(k => k.startsWith(dstr));
      arr.push(hasActivity);
    }
    return arr;
  }

  // completion summary for a given day's *today* log -> {completed, total}
  function dayProgress(dayId) {
    const dayDef = DAYS.find(d => d.id === dayId);
    const exList = getExercisesForDay(dayId);
    const key = dayKey(dayId);
    const dl = log[key];
    if (!dl) return { completed: 0, total: dayDef.type === 'lift' ? exList.length : 1 };
    if (dayDef.type === 'lift') {
      let completed = 0;
      exList.forEach((ex, i) => {
        const exLog = dl[i];
        if (exLog && exLog.checks && exLog.checks.filter(Boolean).length >= ex.sets) completed++;
      });
      return { completed, total: exList.length };
    } else {
      return { completed: dl.swimDone ? 1 : 0, total: 1 };
    }
  }

  function getHistory() {
    const out = [];
    Object.keys(log).forEach(key => {
      const m = key.match(/^(\d{4}-\d{2}-\d{2})_day(\d+)$/);
      if (!m) return;
      const dateStr = m[1];
      const dayId = parseInt(m[2], 10);
      const dayDef = DAYS.find(d => d.id === dayId);
      if (!dayDef) return;
      const dayLog = log[key];
      const entries = [];
      if (dayDef.type === 'lift') {
        dayDef.exercises.forEach((ex, i) => {
          const exLog = dayLog[i];
          if (exLog && exLog.weight) entries.push({ name: ex.name, value: `${exLog.weight} kg` });
        });
        if (dayLog.swimDone) entries.push({ name: 'Pool cooldown', value: 'Done ✓' });
      } else {
        if (dayLog.swimMinutes) entries.push({ name: 'Swim', value: `${dayLog.swimMinutes} min` });
        else if (dayLog.swimDone) entries.push({ name: 'Swim', value: 'Done ✓' });
      }
      if (entries.length > 0 || dayLog.notes) {
        out.push({ dateStr, dayId, dayLabel: `${dayDef.label} · ${dayDef.sub}`, entries, notes: dayLog.notes });
      }
    });
    out.sort((a, b) => b.dateStr.localeCompare(a.dateStr));
    return out.slice(0, 14);
  }

  function formatDate(dateStr) {
    const d = new Date(dateStr + 'T00:00:00');
    return d.toLocaleDateString('en-US', { weekday: 'short', month: 'short', day: 'numeric' });
  }

  // Stats computation
  function getStats() {
    const todayStr = todayKey();
    const sessionDates = new Set();
    let totalSwimMin = 0;
    let sessionsLast7 = new Set();
    let sessionsLast30 = new Set();

    Object.keys(log).forEach(key => {
      const m = key.match(/^(\d{4}-\d{2}-\d{2})_day(\d+)$/);
      if (!m) return;
      const dateStr = m[1];
      const dayId = parseInt(m[2], 10);
      const dayDef = DAYS.find(d => d.id === dayId);
      if (!dayDef) return;
      const dl = log[key];
      let hasActivity = false;
      if (dayDef.type === 'lift') {
        dayDef.exercises.forEach((ex, i) => {
          if (dl[i] && dl[i].checks && dl[i].checks.some(Boolean)) hasActivity = true;
        });
        if (dl.swimDone) hasActivity = true;
      } else {
        if (dl.swimDone || dl.swimMinutes) hasActivity = true;
        if (dl.swimMinutes) totalSwimMin += parseInt(dl.swimMinutes, 10) || 0;
      }
      if (hasActivity) {
        sessionDates.add(dateStr);
        const diff = daysBetween(dateStr, todayStr);
        if (diff >= 0 && diff < 7) sessionsLast7.add(dateStr);
        if (diff >= 0 && diff < 30) sessionsLast30.add(dateStr);
      }
    });

    // per-exercise first vs latest weight + full series for charting
    const exProgress = [];
    DAYS.filter(d => d.type === 'lift').forEach(dayDef => {
      dayDef.exercises.forEach((ex, exIdx) => {
        const keys = Object.keys(log)
          .filter(k => k.endsWith(`_day${dayDef.id}`))
          .sort((a, b) => a.localeCompare(b));
        let first = null, latest = null;
        const series = [];
        keys.forEach(k => {
          const exLog = log[k][exIdx];
          if (exLog && exLog.weight) {
            if (first === null) first = exLog.weight;
            latest = exLog.weight;
            series.push({ x: k, y: parseFloat(exLog.weight) });
          }
        });
        if (first !== null && latest !== null) {
          exProgress.push({ name: ex.name, first, latest, series });
        }
      });
    });

    return {
      sessionsLast7: sessionsLast7.size,
      sessionsLast30: sessionsLast30.size,
      totalSwimMin,
      exProgress,
    };
  }

  async function exportBackup() {
    const cs = await window.storage.get('cycle-start').catch(() => null);
    const backupData = {
      type: 'training-tracker-backup',
      exportedAt: new Date().toISOString(),
      cycleStart: cs ? cs.value : null,
      log: log,
      bodyLog: bodyLog,
      goalWeight: goalWeight,
      customDays: customDays,
    };
    const jsonStr = JSON.stringify(backupData, null, 2);
    const filename = `training-backup-${todayKey()}.json`;

    try {
      const file = new File([jsonStr], filename, { type: 'application/json' });
      if (navigator.canShare && navigator.canShare({ files: [file] })) {
        await navigator.share({ files: [file], title: 'Training Backup' });
        setBackupStatus('Backup shared ✓');
        return;
      }
    } catch (e) { /* fall through to download */ }

    try {
      const blob = new Blob([jsonStr], { type: 'application/json' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = filename;
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
      URL.revokeObjectURL(url);
      setBackupStatus('Backup downloaded ✓ — move it to Files/iCloud Drive');
    } catch (e) {
      setBackupStatus('Export failed — try again');
    }
  }

  function triggerImport() {
    if (fileInputRef.current) fileInputRef.current.click();
  }

  async function handleImportFile(e) {
    const file = e.target.files[0];
    if (!file) return;
    try {
      const text = await file.text();
      const parsed = JSON.parse(text);
      if (parsed.type !== 'training-tracker-backup' || !parsed.log) {
        setBackupStatus('That file doesn\'t look like a valid backup');
        return;
      }
      await window.storage.set('workout-log', JSON.stringify(parsed.log), false);
      if (parsed.cycleStart) await window.storage.set('cycle-start', parsed.cycleStart, false);
      if (parsed.bodyLog) await window.storage.set('body-log', JSON.stringify(parsed.bodyLog), false);
      if (parsed.goalWeight) await window.storage.set('goal-weight', parsed.goalWeight, false);
      if (parsed.customDays) await window.storage.set('custom-days', JSON.stringify(parsed.customDays), false);
      setLog(parsed.log);
      if (parsed.cycleStart) setCycleStart(parsed.cycleStart);
      if (parsed.bodyLog) setBodyLog(parsed.bodyLog);
      if (parsed.goalWeight) setGoalWeightState(parsed.goalWeight);
      if (parsed.customDays) setCustomDays(parsed.customDays);
      setBackupStatus('Backup restored ✓');
    } catch (err) {
      setBackupStatus('Could not read that file — make sure it\'s a backup exported from here');
    }
    e.target.value = '';
  }

  async function persistBody(newBodyLog) {
    setBodyLog(newBodyLog);
    try {
      await window.storage.set('body-log', JSON.stringify(newBodyLog), false);
    } catch (e) { console.error('body save failed', e); }
    setToast(true);
    clearTimeout(toastTimer.current);
    toastTimer.current = setTimeout(() => setToast(false), 1200);
  }

  function setBodyField(field, val) {
    const k = todayKey();
    const entry = { ...(bodyLog[k] || {}) };
    entry[field] = val;
    persistBody({ ...bodyLog, [k]: entry });
  }

  function getBodyHistory() {
    return Object.keys(bodyLog)
      .filter(k => bodyLog[k] && (bodyLog[k].weight || bodyLog[k].waist))
      .sort((a, b) => b.localeCompare(a));
  }

  async function setGoalWeight(val) {
    setGoalWeightState(val);
    try {
      await window.storage.set('goal-weight', val, false);
    } catch (e) { console.error('goal save failed', e); }
  }

  function getBodyStats() {
    const dates = getBodyHistory();
    if (dates.length === 0) return null;
    const todayStr = todayKey();
    const last7 = dates.filter(d => {
      const diff = daysBetween(d, todayStr);
      return diff >= 0 && diff < 7;
    });
    const weights7 = last7.map(d => parseFloat(bodyLog[d].weight)).filter(n => !isNaN(n));
    const avg7 = weights7.length ? (weights7.reduce((a,b)=>a+b,0) / weights7.length) : null;

    const sortedAsc = [...dates].sort((a,b) => a.localeCompare(b));
    const firstWithWeight = sortedAsc.find(d => bodyLog[d].weight);
    const firstWeight = firstWithWeight ? parseFloat(bodyLog[firstWithWeight].weight) : null;
    const latestDateWithWeight = dates.find(d => bodyLog[d].weight);
    const latestWeight = latestDateWithWeight ? parseFloat(bodyLog[latestDateWithWeight].weight) : null;
    const totalChange = (firstWeight !== null && latestWeight !== null) ? (latestWeight - firstWeight) : null;

    const goal = parseFloat(goalWeight);
    let goalStats = null;
    if (!isNaN(goal) && firstWeight !== null && latestWeight !== null) {
      const lostSoFar = firstWeight - latestWeight;
      const remaining = latestWeight - goal;
      const totalToLose = firstWeight - goal;
      let pct = totalToLose > 0 ? (lostSoFar / totalToLose) * 100 : 0;
      pct = Math.max(0, Math.min(100, pct));
      goalStats = { lostSoFar, remaining, totalToLose, pct, goal, startWeight: firstWeight, currentWeight: latestWeight };
    }

    return { avg7, totalChange, firstWeight, latestWeight, count: dates.length, goalStats };
  }

  function setNote(dayId, text) {
    const key = dayKey(dayId);
    const dayLog = { ...(log[key] || {}) };
    dayLog.notes = text;
    persist({ ...log, [key]: dayLog });
  }

  function isPR(dayId, exIdx, weightVal) {
    if (!weightVal) return false;
    const w = parseFloat(weightVal);
    if (isNaN(w)) return false;
    const keys = Object.keys(log).filter(k => k.endsWith(`_day${dayId}`) && k !== dayKey(dayId));
    let maxPast = -Infinity;
    keys.forEach(k => {
      const exLog = log[k][exIdx];
      if (exLog && exLog.weight) {
        const v = parseFloat(exLog.weight);
        if (!isNaN(v) && v > maxPast) maxPast = v;
      }
    });
    return maxPast !== -Infinity && w > maxPast;
  }

  function getExercisesForDay(dayId) {
    const dayDef = DAYS.find(d => d.id === dayId);
    if (customDays[dayId]) return customDays[dayId];
    return dayDef.exercises;
  }

  async function persistCustomDays(newCustomDays) {
    setCustomDays(newCustomDays);
    try {
      await window.storage.set('custom-days', JSON.stringify(newCustomDays), false);
    } catch (e) { console.error('custom days save failed', e); }
  }

  function updateEditingExercise(exIdx, field, val) {
    const dayId = editingDay;
    const current = [...getExercisesForDay(dayId)];
    current[exIdx] = { ...current[exIdx], [field]: val };
    persistCustomDays({ ...customDays, [dayId]: current });
  }

  function addEditingExercise() {
    const dayId = editingDay;
    const current = [...getExercisesForDay(dayId)];
    current.push({ name: "New Exercise", target: "3 sets x 10 reps", rest: 75, sets: 3, reps: 10, how: "Add instructions here." });
    persistCustomDays({ ...customDays, [dayId]: current });
  }

  function removeEditingExercise(exIdx) {
    const dayId = editingDay;
    const current = [...getExercisesForDay(dayId)];
    current.splice(exIdx, 1);
    persistCustomDays({ ...customDays, [dayId]: current });
  }

  function resetDayToDefault(dayId) {
    const newCustomDays = { ...customDays };
    delete newCustomDays[dayId];
    persistCustomDays(newCustomDays);
  }

  function suggestNextWeight(ex, currentWeight) {
    const w = parseFloat(currentWeight);
    if (isNaN(w)) return null;
    const bigLifts = ['leg press', 'hip thrust', 'chest press', 'shoulder press', 'lat pulldown', 'row'];
    const isBig = bigLifts.some(k => ex.name.toLowerCase().includes(k));
    const increment = isBig ? 5 : 2.5;
    return (w + increment).toFixed(1).replace(/\.0$/, '');
  }

  function getBadges() {
    // total sessions logged across all time
    const allDates = new Set();
    let totalSessions = 0;
    let hasPR = false;
    Object.keys(log).forEach(key => {
      const m = key.match(/^(\d{4}-\d{2}-\d{2})_day(\d+)$/);
      if (!m) return;
      const dl = log[key];
      const dayId = parseInt(m[2], 10);
      const dayDef = DAYS.find(d => d.id === dayId);
      if (!dayDef) return;
      let hasActivity = false;
      if (dayDef.type === 'lift') {
        Object.keys(dl).forEach(i => {
          if (dl[i] && dl[i].checks && dl[i].checks.some(Boolean)) hasActivity = true;
        });
        if (dl.swimDone) hasActivity = true;
      } else {
        if (dl.swimDone || dl.swimMinutes) hasActivity = true;
      }
      if (hasActivity) { allDates.add(m[1]); totalSessions++; }
    });

    // longest current streak (consecutive calendar days with activity, ending today or yesterday)
    let streakCount = 0;
    for (let i = 0; i < 60; i++) {
      const d = new Date();
      d.setDate(d.getDate() - i);
      const dstr = d.toISOString().slice(0,10);
      if (allDates.has(dstr)) streakCount++;
      else if (i === 0) continue; // today might not be logged yet, don't break streak
      else break;
    }

    const bstats = getBodyStats();
    const lostSoFar = (bstats && bstats.totalChange !== null) ? -bstats.totalChange : 0;

    const badges = [
      { id: 'first', icon: '🎯', name: 'First Session', desc: 'Complete your first day', earned: totalSessions >= 1 },
      { id: 'streak7', icon: '🔥', name: '7-Day Streak', desc: '7 days in a row in the gym', earned: streakCount >= 7 },
      { id: 'sessions10', icon: '💪', name: '10 Sessions', desc: 'Log 10 total sessions', earned: totalSessions >= 10 },
      { id: 'sessions25', icon: '🏆', name: '25 Sessions', desc: 'Log 25 total sessions', earned: totalSessions >= 25 },
      { id: 'lost2', icon: '📉', name: '2kg Down', desc: 'Lose your first 2kg', earned: lostSoFar >= 2 },
      { id: 'lost5', icon: '⭐', name: '5kg Down', desc: 'Lose 5kg from your start', earned: lostSoFar >= 5 },
      { id: 'lost10', icon: '🌟', name: '10kg Down', desc: 'Lose 10kg from your start', earned: lostSoFar >= 10 },
      { id: 'swimmer', icon: '🏊', name: 'Pool Regular', desc: 'Log 5 swim sessions', earned: (() => {
          let swims = 0;
          Object.keys(log).forEach(k => { if (log[k].swimDone) swims++; });
          return swims >= 5;
        })() },
    ];
    return badges;
  }

  function getWeeklyRecap() {
    const todayStr = todayKey();
    let sessionsThisWeek = new Set();
    let totalVolume = 0;
    let swimMinThisWeek = 0;
    let notesCount = 0;

    Object.keys(log).forEach(key => {
      const m = key.match(/^(\d{4}-\d{2}-\d{2})_day(\d+)$/);
      if (!m) return;
      const dateStr = m[1];
      const diff = daysBetween(dateStr, todayStr);
      if (diff < 0 || diff >= 7) return;
      const dayId = parseInt(m[2], 10);
      const dayDef = DAYS.find(d => d.id === dayId);
      if (!dayDef) return;
      const dl = log[key];
      let hasActivity = false;
      if (dayDef.type === 'lift') {
        const exList = getExercisesForDay(dayId);
        exList.forEach((ex, i) => {
          const exLog = dl[i];
          if (exLog && exLog.checks && exLog.checks.some(Boolean)) {
            hasActivity = true;
            const completedSets = exLog.checks.filter(Boolean).length;
            if (exLog.weight) {
              totalVolume += (parseFloat(exLog.weight) || 0) * completedSets * (ex.reps || 10);
            }
          }
        });
        if (dl.swimDone) hasActivity = true;
      } else {
        if (dl.swimMinutes) { swimMinThisWeek += parseInt(dl.swimMinutes, 10) || 0; hasActivity = true; }
        else if (dl.swimDone) hasActivity = true;
      }
      if (dl.notes) notesCount++;
      if (hasActivity) sessionsThisWeek.add(dateStr);
    });

    // body weight change this week: compare earliest vs latest entry within the window
    let weightChange = null;
    const bodyDatesInWindow = Object.keys(bodyLog)
      .filter(d => { const diff = daysBetween(d, todayStr); return diff >= 0 && diff < 7 && bodyLog[d].weight; })
      .sort();
    if (bodyDatesInWindow.length >= 2) {
      const first = parseFloat(bodyLog[bodyDatesInWindow[0]].weight);
      const last = parseFloat(bodyLog[bodyDatesInWindow[bodyDatesInWindow.length - 1]].weight);
      weightChange = last - first;
    }

    return {
      sessions: sessionsThisWeek.size,
      totalVolume: Math.round(totalVolume),
      swimMinThisWeek,
      weightChange,
      notesCount,
    };
  }

  const day = DAYS.find(d => d.id === activeDay);
  const key = dayKey(activeDay);
  const dayLog = log[key] || {};
  const streak = getStreak();
  const todaysDayId = currentDayIdForToday();
  const stats = view === 'stats' ? getStats() : null;

  const touchStartX = useRef(null);
  function handleTouchStart(e) {
    touchStartX.current = e.touches[0].clientX;
  }
  function handleTouchEnd(e) {
    if (touchStartX.current === null) return;
    const deltaX = e.changedTouches[0].clientX - touchStartX.current;
    if (Math.abs(deltaX) > 60) {
      if (deltaX < 0) {
        setActiveDay(prev => (prev % 7) + 1);
      } else {
        setActiveDay(prev => ((prev - 2 + 7) % 7) + 1);
      }
      setOpenEx(null);
    }
    touchStartX.current = null;
  }

  return (
    <div>
      <div className="header">
        <h1>Your Training Plan</h1>
        <p>Fat loss · Beginner · Full gym + pool</p>
        <div className="streak-row">
          {streak.map((d, i) => (
            <div key={i} className={`streak-dot ${d ? 'done' : ''}`}></div>
          ))}
        </div>
      </div>

      <div className="backup-row">
        <span className="backup-link" onClick={() => setShowBackup(!showBackup)}>
          {showBackup ? 'Hide backup options' : 'Backup / restore my data'}
        </span>
      </div>

      {showBackup && (
        <div className="backup-panel">
          <div className="bp-title">Keep your data safe</div>
          <div className="bp-desc">
            Export saves a file with everything you've logged — save it to iCloud Drive, email it to yourself, anywhere you like. Import restores from a file you exported before.
          </div>
          <div className="backup-btn-row">
            <div className="backup-btn primary" onClick={exportBackup}>Export Backup</div>
            <div className="backup-btn" onClick={triggerImport}>Import Backup</div>
          </div>
          {backupStatus && <div className="backup-status">{backupStatus}</div>}
          <input
            type="file"
            accept="application/json"
            ref={fileInputRef}
            style={{ display: 'none' }}
            onChange={handleImportFile}
          />
        </div>
      )}

      <div className="view-toggle">
        <div className={`view-btn ${view === 'train' ? 'active' : ''}`} onClick={() => setView('train')}><span className="vb-icon">🏋️</span>Train</div>
        <div className={`view-btn ${view === 'body' ? 'active' : ''}`} onClick={() => setView('body')}><span className="vb-icon">⚖️</span>Body</div>
        <div className={`view-btn ${view === 'history' ? 'active' : ''}`} onClick={() => setView('history')}><span className="vb-icon">📜</span>History</div>
        <div className={`view-btn ${view === 'stats' ? 'active' : ''}`} onClick={() => setView('stats')}><span className="vb-icon">📊</span>Stats</div>
      </div>

      {view === 'train' && (
      <div className="tabs">
        {DAYS.map(d => {
          const prog = dayProgress(d.id);
          const pct = prog.total > 0 ? (prog.completed / prog.total) * 100 : 0;
          return (
            <div
              key={d.id}
              className={`tab ${dayTabClass(d.sub)} ${activeDay === d.id ? 'active' : ''} ${todaysDayId === d.id ? 'today' : ''}`}
              onClick={() => { setActiveDay(d.id); setOpenEx(null); }}
            >
              <span className="tab-icon">{DAY_TYPE_ICONS[d.sub] || '🏋️'}</span>
              {d.label}<span className="sub">{d.sub}</span>
              {prog.completed > 0 && <ProgressRing pct={pct} color={activeDay === d.id ? '#0E1416' : dayColor(d.sub)} />}
            </div>
          );
        })}
      </div>
      )}

      {view === 'train' && (
      <div className="content" onTouchStart={handleTouchStart} onTouchEnd={handleTouchEnd}>
        <div className="day-title" style={{color: dayColor(day.sub)}}>{day.title}</div>
        <div className="day-meta">
          {day.meta}{todaysDayId === activeDay ? ' · Today' : ''}
          {day.type === 'lift' && (
            <span className="backup-link" style={{marginLeft: '8px'}} onClick={() => setEditingDay(activeDay)}>· Edit exercises</span>
          )}
        </div>
        <div className="swipe-hint">‹ swipe to switch days ›</div>

        {day.type === 'lift' && getExercisesForDay(activeDay).map((ex, exIdx) => {
          const exLog = dayLog[exIdx] || { checks: [], weight: '' };
          const isOpen = openEx === exIdx;
          const isComplete = exLog.checks && exLog.checks.filter(Boolean).length >= ex.sets;
          const last = lastWeightFor(activeDay, exIdx);
          const suggestion = isComplete && exLog.weight ? suggestNextWeight(ex, exLog.weight) : null;
          return (
            <div className={`ex-card ${isComplete ? 'complete' : ''}`} style={isComplete ? {borderColor: dayColor(day.sub)} : {}} key={exIdx}>
              <div className="ex-head" onClick={() => setOpenEx(isOpen ? null : exIdx)}>
                <div>
                  <div className="ex-name">{ex.name}</div>
                  <div className="ex-target">{ex.target}</div>
                </div>
                <div className={`chev ${isOpen ? 'open' : ''}`}>▾</div>
              </div>
              <div className={`ex-how ${isOpen ? 'open' : ''}`}>{ex.how}</div>
              <div className="sets-row">
                {Array.from({ length: ex.sets }).map((_, setIdx) => {
                  const checked = exLog.checks && exLog.checks[setIdx];
                  return (
                  <div className="set-box" key={setIdx}>
                    <div className="set-label">SET {setIdx + 1}</div>
                    <div
                      className={`set-check ${checked ? 'checked' : ''}`}
                      style={checked ? {background: dayColor(day.sub), borderColor: dayColor(day.sub)} : {}}
                      onClick={() => toggleSet(activeDay, exIdx, setIdx, ex)}
                    >
                      {checked ? '✓' : ''}
                    </div>
                  </div>
                  );
                })}
              </div>
              <div className="weight-row">
                <label>Weight:</label>
                <input
                  type="text"
                  inputMode="decimal"
                  placeholder="kg"
                  value={exLog.weight || ''}
                  onChange={(e) => setWeight(activeDay, exIdx, e.target.value)}
                />
                {last && <span className="last-hint">last: {last} kg</span>}
                {isPR(activeDay, exIdx, exLog.weight) && <span className="pr-badge">PR</span>}
              </div>
              {suggestion && (
                <div className="suggestion-row">💡 All sets done — try <strong>{suggestion}kg</strong> next time</div>
              )}
            </div>
          );
        })}

        {day.type === 'lift' && day.swimCooldown && (
          <div className="swim-card" style={{marginTop: '4px'}}>
            <div className="icon">🏊</div>
            <div className="desc">{day.swimCooldown}</div>
            <button
              className={`done-btn ${dayLog.swimDone ? 'done' : 'pending'}`}
              onClick={() => toggleSwimDone(activeDay)}
            >
              {dayLog.swimDone ? '✓ Cooldown done' : 'Mark cooldown done'}
            </button>
          </div>
        )}

        {day.type === 'swim' && (
          <div className="swim-card">
            <div className="icon">🏊</div>
            <div className="desc">{day.swimDesc}</div>
            <div className="swim-input">
              <label>Minutes swam:</label>
              <input
                type="text"
                inputMode="numeric"
                placeholder="0"
                value={dayLog.swimMinutes || ''}
                onChange={(e) => setSwimMinutes(activeDay, e.target.value)}
              />
            </div>
            <button
              className={`done-btn ${dayLog.swimDone ? 'done' : 'pending'}`}
              onClick={() => toggleSwimDone(activeDay)}
            >
              {dayLog.swimDone ? '✓ Session logged' : 'Mark session done'}
            </button>
          </div>
        )}

        <div className="notes-card">
          <label>Session notes (optional)</label>
          <textarea
            placeholder="e.g. knee felt a bit off today, or great session, hit a new PR..."
            value={dayLog.notes || ''}
            onChange={(e) => setNote(activeDay, e.target.value)}
          />
        </div>

        <div className="timing-note">
          Per exercise: ~4–6 min (3 sets, rest auto-timed between).<br/>
          Sharp or pinching knee pain = stop and swap the exercise.
        </div>
      </div>
      )}

      {view === 'body' && (
      <div className="content">
        <div className="day-title">Body Tracking</div>
        <div className="day-meta">Log daily — only compare weekly averages, not single days</div>

        <div className="goal-card">
          <div className="goal-row">
            <label>Goal weight (kg)</label>
            <input
              type="text"
              inputMode="decimal"
              placeholder="e.g. 90"
              value={goalWeight}
              onChange={(e) => setGoalWeight(e.target.value)}
            />
          </div>
        </div>

        <div className="body-entry-card">
          <div className="body-entry-row">
            <div className="body-field">
              <label>Weight (kg)</label>
              <input
                type="text"
                inputMode="decimal"
                placeholder="107"
                value={(bodyLog[todayKey()] && bodyLog[todayKey()].weight) || ''}
                onChange={(e) => setBodyField('weight', e.target.value)}
              />
            </div>
            <div className="body-field">
              <label>Waist (cm)</label>
              <input
                type="text"
                inputMode="decimal"
                placeholder="102"
                value={(bodyLog[todayKey()] && bodyLog[todayKey()].waist) || ''}
                onChange={(e) => setBodyField('waist', e.target.value)}
              />
            </div>
          </div>
        </div>

        {(() => {
          const bstats = getBodyStats();
          if (!bstats) return (
            <div className="hist-empty">No entries yet — log your weight above to start tracking.</div>
          );
          return (
            <React.Fragment>
              {bstats.goalStats && (
                <div className="goal-card">
                  <div className="stats-grid" style={{marginBottom: 0}}>
                    <div className="stat-card">
                      <div className="stat-num">{bstats.goalStats.lostSoFar.toFixed(1)}</div>
                      <div className="stat-label">kg lost so far</div>
                    </div>
                    <div className="stat-card">
                      <div className="stat-num">{Math.max(0, bstats.goalStats.remaining).toFixed(1)}</div>
                      <div className="stat-label">kg to go</div>
                    </div>
                  </div>
                  <div className="progress-bar-track">
                    <div className="progress-bar-fill" style={{width: `${bstats.goalStats.pct}%`}}></div>
                  </div>
                  <div className="progress-bar-labels">
                    <span>{bstats.goalStats.startWeight} kg start</span>
                    <span>{bstats.goalStats.goal} kg goal</span>
                  </div>
                  <div className="progress-pct">{bstats.goalStats.pct.toFixed(0)}% of the way there</div>
                </div>
              )}

              <div className="stats-grid">
                <div className="stat-card">
                  <div className="stat-num">{bstats.avg7 ? bstats.avg7.toFixed(1) : '—'}</div>
                  <div className="stat-label">7-day avg weight (kg)</div>
                </div>
                <div className="stat-card">
                  <div className="stat-num">
                    {bstats.totalChange !== null ? (bstats.totalChange > 0 ? '+' : '') + bstats.totalChange.toFixed(1) : '—'}
                  </div>
                  <div className="stat-label">Change since first log (kg)</div>
                </div>
              </div>

              <div className="chart-wrap">
                <div className="chart-title">Weight trend</div>
                <LineChart
                  color="#2DD4BF"
                  points={getBodyHistory().slice(0, 30).reverse()
                    .filter(d => bodyLog[d].weight)
                    .map(d => ({ x: d, y: parseFloat(bodyLog[d].weight) }))}
                />
              </div>

              <div className="progress-section-title">Recent entries</div>
              {getBodyHistory().slice(0, 14).map((dstr, i) => {
                const e = bodyLog[dstr];
                return (
                  <div className="body-list-row" key={i}>
                    <div className="body-list-date">{formatDate(dstr)}</div>
                    <div className="body-list-vals">
                      {e.weight ? <span>{e.weight}<span className="unit">kg</span></span> : ''}
                      {e.weight && e.waist ? '  ·  ' : ''}
                      {e.waist ? <span>{e.waist}<span className="unit">cm</span></span> : ''}
                    </div>
                  </div>
                );
              })}
            </React.Fragment>
          );
        })()}
      </div>
      )}

      {view === 'history' && (
      <div className="content">
        {getHistory().length === 0 && (
          <div className="hist-empty">
            No sessions logged yet.<br/>
            Check off a set or log a swim and it'll show up here.
          </div>
        )}
        {getHistory().map((session, i) => (
          <div className="hist-day-card" key={i}>
            <div className="hist-day-head">
              <div className="hist-date">{formatDate(session.dateStr)}</div>
              <div className="hist-daylabel">{session.dayLabel}</div>
            </div>
            {session.entries.map((entry, j) => (
              <div className="hist-ex-row" key={j}>
                <div className="hist-ex-name">{entry.name}</div>
                <div className="hist-ex-val">{entry.value}</div>
              </div>
            ))}
            {session.notes && <div className="hist-note">"{session.notes}"</div>}
          </div>
        ))}
      </div>
      )}

      {view === 'stats' && stats && (
      <div className="content">
        {(() => {
          const recap = getWeeklyRecap();
          return (
            <div className="recap-card">
              <div className="recap-title">This week's recap</div>
              <div className="recap-row">
                <div className="recap-label">Sessions completed</div>
                <div className="recap-val">{recap.sessions} / 7</div>
              </div>
              <div className="recap-row">
                <div className="recap-label">Total weight lifted</div>
                <div className="recap-val">{recap.totalVolume.toLocaleString()} kg</div>
              </div>
              <div className="recap-row">
                <div className="recap-label">Swim minutes</div>
                <div className="recap-val">{recap.swimMinThisWeek} min</div>
              </div>
              <div className="recap-row">
                <div className="recap-label">Weight change</div>
                <div className="recap-val">
                  {recap.weightChange !== null
                    ? (recap.weightChange > 0 ? '+' : '') + recap.weightChange.toFixed(1) + ' kg'
                    : 'Log weight 2+ days this week'}
                </div>
              </div>
            </div>
          );
        })()}

        <div className="progress-section-title">Achievements</div>
        <div className="badges-grid" style={{marginBottom: '18px'}}>
          {getBadges().map((b, i) => (
            <div className={`badge-card ${b.earned ? 'earned' : ''}`} key={i}>
              <div className="badge-icon">{b.icon}</div>
              <div className="badge-name">{b.name}</div>
              <div className="badge-desc">{b.desc}</div>
            </div>
          ))}
        </div>

        <div className="stats-grid">
          <div className="stat-card">
            <div className="stat-num">{stats.sessionsLast7}</div>
            <div className="stat-label">Sessions, last 7 days</div>
          </div>
          <div className="stat-card">
            <div className="stat-num">{stats.sessionsLast30}</div>
            <div className="stat-label">Sessions, last 30 days</div>
          </div>
          <div className="stat-card">
            <div className="stat-num">{stats.totalSwimMin}</div>
            <div className="stat-label">Total swim minutes</div>
          </div>
          <div className="stat-card">
            <div className="stat-num">{stats.exProgress.length}</div>
            <div className="stat-label">Lifts with logged progress</div>
          </div>
        </div>

        <div className="progress-section-title">Weight progress</div>
        {stats.exProgress.length === 0 && (
          <div className="hist-empty">Log weight on at least two different days for an exercise to see progress here.</div>
        )}
        {stats.exProgress.slice(0, 3).filter(p => p.series.length >= 3).map((p, i) => (
          <div className="chart-wrap" key={`chart-${i}`}>
            <div className="chart-title">{p.name}</div>
            <LineChart color="#FF7A5C" points={p.series} />
          </div>
        ))}
        {stats.exProgress.map((p, i) => {
          const delta = parseFloat(p.latest) - parseFloat(p.first);
          return (
            <div className="progress-row" key={i}>
              <div className="progress-ex-name">{p.name}</div>
              <div className="progress-vals">
                {p.first}<span className="arrow">→</span>{p.latest} kg
                {delta > 0 && <div className="delta-up">+{delta.toFixed(1)} kg</div>}
                {delta === 0 && <div className="delta-flat">no change yet</div>}
              </div>
            </div>
          );
        })}
      </div>
      )}

      <div className={`save-toast ${toast ? 'show' : ''}`}>Saved ✓</div>

      <div className={`rest-banner ${rest ? 'show' : ''}`}>
        {rest && (
          <React.Fragment>
            <div>
              <div className="rest-label">REST · {rest.exName} · 🔒 screen on</div>
              <div className="rest-time">{Math.floor(rest.secondsLeft/60)}:{String(rest.secondsLeft%60).padStart(2,'0')}</div>
            </div>
            <button className="rest-skip" onClick={skipRest}>Skip</button>
          </React.Fragment>
        )}
      </div>

      {editingDay && (
        <div className="edit-overlay" onClick={() => setEditingDay(null)}>
          <div className="edit-panel" onClick={(e) => e.stopPropagation()}>
            <div className="edit-panel-head">
              <h2>Edit {DAYS.find(d => d.id === editingDay).label} exercises</h2>
              <button className="edit-close" onClick={() => setEditingDay(null)}>Done</button>
            </div>
            {getExercisesForDay(editingDay).map((ex, exIdx) => (
              <div className="edit-ex-card" key={exIdx}>
                <div className="edit-ex-field">
                  <label>Exercise name</label>
                  <input type="text" value={ex.name} onChange={(e) => updateEditingExercise(exIdx, 'name', e.target.value)} />
                </div>
                <div className="edit-ex-row3">
                  <div className="edit-ex-field">
                    <label>Sets</label>
                    <input type="number" value={ex.sets} onChange={(e) => updateEditingExercise(exIdx, 'sets', parseInt(e.target.value) || 1)} />
                  </div>
                  <div className="edit-ex-field">
                    <label>Reps</label>
                    <input type="number" value={ex.reps} onChange={(e) => updateEditingExercise(exIdx, 'reps', parseInt(e.target.value) || 1)} />
                  </div>
                  <div className="edit-ex-field">
                    <label>Rest (sec)</label>
                    <input type="number" value={ex.rest} onChange={(e) => updateEditingExercise(exIdx, 'rest', parseInt(e.target.value) || 60)} />
                  </div>
                </div>
                <div className="edit-ex-field">
                  <label>Target display text</label>
                  <input type="text" value={ex.target} onChange={(e) => updateEditingExercise(exIdx, 'target', e.target.value)} />
                </div>
                <div className="edit-ex-field">
                  <label>How-to instructions</label>
                  <textarea rows="3" value={ex.how} onChange={(e) => updateEditingExercise(exIdx, 'how', e.target.value)} />
                </div>
                <button className="edit-remove-btn" onClick={() => removeEditingExercise(exIdx)}>Remove exercise</button>
              </div>
            ))}
            <div className="edit-panel-actions">
              <div className="edit-add-btn" onClick={addEditingExercise}>+ Add exercise</div>
              <div className="edit-reset-btn" onClick={() => resetDayToDefault(editingDay)}>Reset to default</div>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('app')).render(<App />);
</script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.5/babel.min.js"></script>
</body>
</html>
